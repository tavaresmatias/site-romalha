<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo - Romalha Pereira | Direito Imobiliário</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .article-hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .article-hero h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 20px 0;
        }
        .article-meta {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 20px;
        }
        .article-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .article-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .article-content {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-color);
        }
        .article-content p {
            margin-bottom: 20px;
        }
        .article-content h2 {
            font-size: 28px;
            margin: 40px 0 20px;
            color: var(--primary-color);
        }
        .article-content strong {
            color: var(--primary-color);
            font-weight: 600;
        }
        .article-tag {
            display: inline-block;
            background: var(--light-bg);
            color: var(--secondary-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .article-footer {
            border-top: 1px solid #eee;
            padding-top: 40px;
            margin-top: 60px;
            text-align: center;
        }
        .article-cta {
            background: var(--light-bg);
            padding: 40px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 60px 0;
        }
        .article-cta h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        .article-back {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <div class="logo-text">
                    <h1>Romalha Pereira</h1>
                    <p class="subtitle">ADVOGACIA IMOBILIÁRIA</p>
                </div>
            <a href="https://wa.me/5524988648105" class="whatsapp-btn" target="_blank">WhatsApp</a>
        </div>
    </header>

    <!-- Article Hero -->
    <section class="article-hero">
        <div class="container">
            <a href="/blog" class="article-back">← Voltar ao Blog</a>
            <h1 id="article-title">Carregando artigo...</h1>
            <div class="article-meta">
                <span id="article-date"></span> • <span id="article-category"></span>
            </div>
        </div>
    </section>

    <!-- Article Content -->
    <section class="article-container">
        <div class="article-image" id="article-image"></div>

        <span class="article-tag" id="article-tag"></span>

        <div class="article-content" id="article-content">
            <!-- Conteúdo renderizado via JS -->
        </div>

        <!-- CTA -->
        <div class="article-cta">
            <h3>Precisa de ajuda com seu imóvel?</h3>
            <p>Entre em contato com a Romalha para uma consulta especializada</p>
            <a href="https://wa.me/5524988648105" class="btn btn-primary" target="_blank">Fale com a Romalha</a>
        </div>

        <div class="article-footer">
            <a href="/blog" class="article-back">← Voltar ao Blog</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-logo">
                <h3>Romalha Pereira</h3>
                <p>ADVOGACIA IMOBILIÁRIA</p>
            </div>
            <a href="https://wa.me/5524988648105" class="whatsapp-btn" target="_blank">WhatsApp</a>
        </div>
    </footer>

    <script>
        // Pegar ID do artigo da URL
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id'));

        // Carregar dados
        fetch('data-blog.json')
            .then(res => res.json())
            .then(data => {
                const article = data.blog.find(a => a.id === articleId);

                if (!article) {
                    document.getElementById('article-content').innerHTML = '<p>Artigo não encontrado</p>';
                    return;
                }

                // Preencher dados
                document.title = `${article.title} - Romalha Pereira`;
                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').textContent = new Date(article.date).toLocaleDateString('pt-BR');
                document.getElementById('article-category').textContent = article.category;
                document.getElementById('article-tag').textContent = article.category;
                document.getElementById('article-image').textContent = article.category;
                document.getElementById('article-content').innerHTML = article.content.replace(/\n/g, '<p>').replace(/</p><p>/g, '</p><p>').replace(/^/g, '<p>').replace(/$/g, '</p>');
            });
    </script>
</body>
</html>
