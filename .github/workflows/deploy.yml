name: Deploy Romalha Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "════════════════════════════════════════"
            echo "🚀 DEPLOYMENT AUTOMÁTICO - INICIANDO"
            echo "════════════════════════════════════════"
            cd ~/public_html/site-romalha
            echo "✅ Diretório: $(pwd)"

            echo "📥 Atualizando código..."
            git pull origin main

            echo "📦 Instalando dependências..."
            npm install

            echo "🛑 Parando versão anterior..."
            pm2 delete "site-romalha" 2>/dev/null || true

            echo "🚀 Iniciando com PM2..."
            pm2 start app.js --name "site-romalha"
            pm2 startup
            pm2 save

            echo "📊 Status:"
            pm2 status

            echo ""
            echo "════════════════════════════════════════"
            echo "✅ DEPLOYMENT AUTOMÁTICO CONCLUÍDO!"
            echo "════════════════════════════════════════"
